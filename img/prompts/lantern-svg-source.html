<!-- Unlit White Sky Lantern -->
<svg viewBox="0 0 100 125" xmlns="http://www.w3.org/2000/svg">

    <radialGradient id="paperGlowWhite" cx="50%" cy="65%" r="85%">
      <stop offset="0%" stop-color="#ffffff" />
      <stop offset="50%" stop-color="#f5f5f5" />
      <stop offset="100%" stop-color="#e0e0e0" />
    </radialGradient>
    
    <!-- Internal reflection for white fabric (dimmer for unlit version) -->
    <radialGradient id="internalReflectWhiteUnlit" cx="50%" cy="100%" r="100%">
      <stop offset="0%" stop-color="#eeeeee" />
      <stop offset="100%" stop-color="#bdbdbd" />
    </radialGradient>
  </defs>
  
  <!-- Lantern Body -->
  <path d="M25 25 Q 50 20 75 25 Q 95 30 90 65 Q 86 90 83 105 Q 84 112 84 114 L 16 114 Q 16 112 17 105 Q 14 90 10 65 Q 5 30 25 25 Z" fill="url(#paperGlowWhite)" />
  
  <!-- Structural Ribs (Bowed) -->
  <g opacity="0.18" fill="none" stroke="#000" stroke-width="1">
    <path d="M35 25 C 20 30 25 65 30 112" />
    <path d="M65 25 C 80 30 75 65 70 112" />
  </g>
  
  <!-- Subtle Horizontal Paper Texture -->
  <g opacity="0.05" fill="none" stroke="#000" stroke-width="0.5">
    <path d="M30 40 Q 50 38 70 40" />
    <path d="M20 70 Q 50 68 80 70" />
    <path d="M32 98 Q 50 100 68 98" />
  </g>
  
  <!-- Mouth / Opening -->
  <ellipse cx="50" cy="114" rx="34" ry="6" fill="url(#internalReflectWhiteUnlit)" />
  <ellipse cx="50" cy="114" rx="35" ry="6.5" fill="none" stroke="#3e2723" stroke-width="1.2" />
</svg>
